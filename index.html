    /* ─────────────── REMOVE BG TOOL ─────────────── */
    function RemoveBackgroundTool({ dark, card, cardInk, muted, line, color, isAr }) {
      const canvasRef = useRef(null);
      const fileInputRef = useRef(null);
      const originalRef = useRef(null);
      const paintingRef = useRef(false);
      const MAX_DIM = 900;
      const [hasImage, setHasImage] = useState(false);
      const [dragging, setDragging] = useState(false);
      const [tolerance, setTolerance] = useState(32);
      const [brush, setBrush] = useState(18);
      const [mode, setMode] = useState("erase");

      const L = isAr ? {
        drop1: "اسحب صورة هنا أو اضغط للرفع", drop2: "JPG أو PNG — تتم المعالجة على جهازك فقط",
        upload: "📤 رفع صورة", tolerance: "حساسية الإزالة", auto: "✨ إزالة تلقائية",
        brushMode: "وضع الفرشاة", erase: "🧽 مسح", restore: "↩️ استرجاع",
        brushSize: "حجم الفرشاة", resetImg: "↺ استرجاع الصورة الأصلية", download: "⬇ تنزيل PNG",
        hint: "نصيحة: زوّد الحساسية إذا الخلفية ما راحت كلها، أو قلّلها إذا بدأت تاكل من الصورة.",
      } : {
        drop1: "Drop an image here or click to upload", drop2: "JPG or PNG — processed entirely on your device",
        upload: "📤 Upload image", tolerance: "Removal sensitivity", auto: "✨ Auto remove",
        brushMode: "Brush mode", erase: "🧽 Erase", restore: "↩️ Restore",
        brushSize: "Brush size", resetImg: "↺ Reset to original", download: "⬇ Download PNG",
        hint: "Tip: raise sensitivity if background is left behind, lower it if it eats the subject.",
      };

      function loadFile(file) {
        if (!file) return;
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          let w = img.naturalWidth, h = img.naturalHeight;
          const scale = Math.min(1, MAX_DIM / Math.max(w, h));
          w = Math.round(w * scale); h = Math.round(h * scale);
          const cv = canvasRef.current;
          cv.width = w; cv.height = h;
          const ctx = cv.getContext("2d", { willReadFrequently: true });
          ctx.clearRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);
          originalRef.current = ctx.getImageData(0, 0, w, h);
          setHasImage(true);
          URL.revokeObjectURL(url);
        };
        img.src = url;
      }

      function autoRemove() {
        const cv = canvasRef.current;
        if (!cv || !originalRef.current) return;
        const ctx = cv.getContext("2d", { willReadFrequently: true });
        const w = cv.width, h = cv.height;
        const src = ctx.getImageData(0, 0, w, h);
        const data = src.data;
        const tolSq = (tolerance * 2.55) * (tolerance * 2.55) * 3;
        const visited = new Uint8Array(w * h);
        const queue = new Int32Array(w * h);
        let qHead = 0, qTail = 0;
        const idx = (x, y) => y * w + x;
        const pushSeed = (x, y) => { const i = idx(x, y); if (!visited[i]) { visited[i] = 1; queue[qTail++] = i; } };
        for (let x = 0; x < w; x++) { pushSeed(x, 0); pushSeed(x, h - 1); }
        for (let y = 0; y < h; y++) { pushSeed(0, y); pushSeed(w - 1, y); }
        const colorDistSq = (i1, i2) => {
          const dr = data[i1] - data[i2], dg = data[i1+1] - data[i2+1], db = data[i1+2] - data[i2+2];
          return dr*dr + dg*dg + db*db;
        };
        while (qHead < qTail) {
          const i = queue[qHead++];
          const x = i % w, y = (i / w) | 0;
          const p = i * 4;
          data[p + 3] = 0;
          const neighbors = [[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
          for (const [nx, ny] of neighbors) {
            if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
            const ni = idx(nx, ny);
            if (visited[ni]) continue;
            const np = ni * 4;
            if (colorDistSq(p, np) <= tolSq) { visited[ni] = 1; queue[qTail++] = ni; }
          }
        }
        ctx.putImageData(src, 0, 0);
      }

      function resetImage() {
        const cv = canvasRef.current;
        if (!cv || !originalRef.current) return;
        cv.getContext("2d").putImageData(originalRef.current, 0, 0);
      }

      function download() {
        const cv = canvasRef.current;
        if (!cv) return;
        const link = document.createElement("a");
        link.download = "no-background.png";
        link.href = cv.toDataURL("image/png");
        link.click();
      }

      function getPos(e) {
        const cv = canvasRef.current;
        const rect = cv.getBoundingClientRect();
        const scaleX = cv.width / rect.width, scaleY = cv.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
      }

      function paintAt(x, y) {
        const cv = canvasRef.current;
        const ctx = cv.getContext("2d", { willReadFrequently: true });
        if (mode === "erase") {
          ctx.save();
          ctx.globalCompositeOperation = "destination-out";
          ctx.beginPath();
          ctx.arc(x, y, brush, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        } else {
          if (!originalRef.current) return;
          const w = cv.width, h = cv.height;
          const current = ctx.getImageData(0, 0, w, h);
          const od = originalRef.current.data, cd = current.data;
          const minX = Math.max(0, Math.floor(x - brush)), maxX = Math.min(w-1, Math.ceil(x + brush));
          const minY = Math.max(0, Math.floor(y - brush)), maxY = Math.min(h-1, Math.ceil(y + brush));
          for (let yy = minY; yy <= maxY; yy++) {
            for (let xx = minX; xx <= maxX; xx++) {
              const dx = xx - x, dy = yy - y;
              if (dx*dx + dy*dy <= brush*brush) {
                const p = (yy * w + xx) * 4;
                cd[p] = od[p]; cd[p+1] = od[p+1]; cd[p+2] = od[p+2]; cd[p+3] = od[p+3];
              }
            }
          }
          ctx.putImageData(current, 0, 0);
        }
      }

      const onPointerDown = (e) => { paintingRef.current = true; const {x,y} = getPos(e); paintAt(x,y); e.preventDefault(); };
      const onPointerMove = (e) => { if (!paintingRef.current) return; const {x,y} = getPos(e); paintAt(x,y); e.preventDefault(); };
      const onPointerUp = () => { paintingRef.current = false; };

      const panelBg = dark ? "#141517" : "#F3EEE1";
      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 20, alignItems: "start" }}>
          <div style={{ background: card, borderRadius: 16, padding: 18, minHeight: 420, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", overflow: "hidden" }}>
            {!hasImage ? (
              <div onClick={() => fileInputRef.current?.click()}
                onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
                onDragLeave={(e) => { e.preventDefault(); setDragging(false); }}
                onDrop={(e) => { e.preventDefault(); setDragging(false); loadFile(e.dataTransfer.files[0]); }}
                style={{ width: "100%", height: 380, border: `1.5px dashed ${dragging ? color : "rgba(0,0,0,0.25)"}`, borderRadius: 12, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, cursor: "pointer", textAlign: "center", padding: 20 }}>
                <div style={{ fontSize: 30 }}>🖼️</div>
                <b style={{ fontSize: 15 }}>{L.drop1}</b>
                <p style={{ margin: 0, color: "#6b6a66", fontSize: 13.5 }}>{L.drop2}</p>
              </div>
            ) : (
              <div style={{ backgroundImage: "linear-gradient(45deg,#ddd 25%,transparent 25%),linear-gradient(-45deg,#ddd 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ddd 75%),linear-gradient(-45deg,transparent 75%,#ddd 75%)", backgroundSize: "16px 16px", backgroundPosition: "0 0,0 8px,8px -8px,-8px 0px", borderRadius: 10, display: "inline-block", lineHeight: 0, width: "100%" }}>
                <canvas ref={canvasRef}
                  style={{ maxWidth: "100%", display: "block", borderRadius: 10, touchAction: "none", cursor: "crosshair", margin: "0 auto" }}
                  onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp} onMouseLeave={onPointerUp}
                  onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp} />
              </div>
            )}
          </div>
          <div style={{ background: panelBg, border: `1px solid ${line}`, borderRadius: 16, padding: 20, display: "flex", flexDirection: "column", gap: 18 }}>
            <input ref={fileInputRef} type="file" accept="image/png,image/jpeg" style={{ display: "none" }} onChange={(e) => loadFile(e.target.files?.[0])} />
            <button className="mono" onClick={() => fileInputRef.current?.click()}
              style={{ background: "transparent", border: `1px solid ${line}`, color: muted, borderRadius: 10, padding: "9px 8px", fontSize: 12.5, cursor: "pointer" }}>
              {L.upload}
            </button>
            <div>
              <label style={{ display: "block", fontSize: 12.5, color: muted, marginBottom: 8 }}>{L.tolerance}: <span className="mono" style={{ color }}>{tolerance}</span></label>
              <input type="range" min={5} max={90} value={tolerance} onChange={(e) => setTolerance(parseInt(e.target.value))} style={{ width: "100%", accentColor: color }} />
            </div>
            <button className="mono" disabled={!hasImage} onClick={autoRemove}
              style={{ background: color, color: "#fff", border: "none", borderRadius: 10, padding: "12px 14px", fontWeight: 600, fontSize: 13.5, cursor: hasImage ? "pointer" : "not-allowed", opacity: hasImage ? 1 : 0.4 }}>
              {L.auto}
            </button>
            <div>
              <label style={{ display: "block", fontSize: 12.5, color: muted, marginBottom: 8 }}>{L.brushMode}</label>
              <div style={{ display: "flex", gap: 8 }}>
                {["erase", "restore"].map((m) => (
                  <button key={m} className="mono" onClick={() => setMode(m)}
                    style={{ flex: 1, background: mode === m ? color : "transparent", color: mode === m ? "#fff" : muted, border: `1px solid ${line}`, borderRadius: 9, padding: "9px 8px", fontSize: 12.5, cursor: "pointer", fontWeight: mode === m ? 600 : 400 }}>
                    {m === "erase" ? L.erase : L.restore}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ display: "block", fontSize: 12.5, color: muted, marginBottom: 8 }}>{L.brushSize}: <span className="mono" style={{ color }}>{brush}</span></label>
              <input type="range" min={4} max={60} value={brush} onChange={(e) => setBrush(parseInt(e.target.value))} style={{ width: "100%", accentColor: color }} />
            </div>
            <button className="mono" disabled={!hasImage} onClick={resetImage}
              style={{ background: "transparent", border: `1px solid ${line}`, color: muted, borderRadius: 10, padding: "12px 14px", fontWeight: 600, fontSize: 13.5, cursor: hasImage ? "pointer" : "not-allowed", opacity: hasImage ? 1 : 0.4 }}>
              {L.resetImg}
            </button>
            <button className="mono" disabled={!hasImage} onClick={download}
              style={{ background: color, color: "#fff", border: "none", borderRadius: 10, padding: "12px 14px", fontWeight: 600, fontSize: 13.5, cursor: hasImage ? "pointer" : "not-allowed", opacity: hasImage ? 1 : 0.4 }}>
              {L.download}
            </button>
            <div style={{ fontSize: 11.5, color: muted, lineHeight: 1.7 }}>{L.hint}</div>
          </div>
        </div>
      );
    }

    /* ─────────────── TOOL PAGE ─────────────── */
    function ToolPage({ tool, t, isAr, dark, card, cardInk, ink, muted, brand, line, Chevron, BackChevron, visitCount, isFav, onToggleFav, onBack, onOpenTool }) {
      const Icon = tool.icon;
      const related = TOOLS.filter((x) => x !== tool && (isAr ? x.cat === tool.cat : x.catEn === tool.catEn)).slice(0, 3);
      return (
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "40px 24px 80px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 28, flexWrap: "wrap", gap: 12 }}>
            <button onClick={onBack} className="mono"
              style={{ display: "flex", alignItems: "center", gap: 6, background: "transparent", border: `1.5px solid ${line}`, color: muted, borderRadius: 10, padding: "8px 14px", fontSize: 12.5, cursor: "pointer" }}>
              <BackChevron size={14} /> {t.back}
            </button>
            <button onClick={onToggleFav} className="mono"
              style={{ display: "flex", alignItems: "center", gap: 6, background: "transparent", border: `1.5px solid ${line}`, color: isFav ? "#EF4444" : muted, borderRadius: 10, padding: "8px 14px", fontSize: 12.5, cursor: "pointer" }}>
              <Heart size={14} color={isFav ? "#EF4444" : muted} fill={isFav ? "#EF4444" : "none"} />
              {isFav ? (isAr ? "بالمفضلة" : "Favorited") : (isAr ? "أضف للمفضلة" : "Add to favorites")}
            </button>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14 }}>
            <div style={{ width: 56, height: 56, borderRadius: 16, background: `${tool.color}1F`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon size={26} color={tool.color} />
            </div>
            <div>
              <div className="mono" style={{ fontSize: 11, color: tool.color, fontWeight: 600, textTransform: "uppercase", marginBottom: 4 }}>{isAr ? tool.cat : tool.catEn}</div>
              <h1 className="disp" style={{ fontSize: "clamp(24px,3.6vw,34px)", fontWeight: 800, margin: 0, color: ink }}>{isAr ? tool.ar : tool.en}</h1>
            </div>
          </div>
          <p style={{ color: muted, fontSize: 15.5, maxWidth: 560, lineHeight: 1.8, marginBottom: 8 }}>{isAr ? tool.ar_d : tool.en_d}</p>
          <div className="mono" style={{ color: muted, fontSize: 12, marginBottom: 32 }}>{t.visits} {visitCount.toLocaleString()} {t.times}</div>

          {tool.id === "remove-bg" ? (
            <RemoveBackgroundTool dark={dark} card={card} cardInk={cardInk} muted={muted} line={line} color={tool.color} isAr={isAr} />
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 20, alignItems: "start" }}>
              <div style={{ background: card, borderRadius: 20, padding: 30, borderTop: `5px solid ${tool.color}`, minHeight: 300, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, border: `2px dashed ${tool.color}55` }}>
                <Icon size={34} color={tool.color} />
                <div className="disp" style={{ fontWeight: 700, fontSize: 16 }}>{isAr ? "اسحب ملفك هنا أو اضغط للرفع" : "Drop your file here or click to upload"}</div>
                <button className="mono" style={{ background: tool.color, color: "#fff", border: "none", borderRadius: 12, padding: "12px 26px", fontWeight: 700, fontSize: 13.5, cursor: "pointer" }}>{t.launch}</button>
              </div>
              <div style={{ background: card, borderRadius: 20, padding: 24 }}>
                <div className="disp" style={{ fontWeight: 800, fontSize: 16, marginBottom: 14 }}>{t.howTitle}</div>
                <ol style={{ margin: 0, padding: isAr ? "0 20px 0 0" : "0 0 0 20px", display: "flex", flexDirection: "column", gap: 12 }}>
                  {t.steps.map((s, i) => <li key={i} style={{ fontSize: 13.5, color: "#6b6a66", lineHeight: 1.7 }}>{s}</li>)}
                </ol>
              </div>
            </div>
          )}

          {related.length > 0 && (
            <div style={{ marginTop: 44 }}>
              <div className="disp" style={{ fontWeight: 800, fontSize: 18, marginBottom: 18, color: ink }}>{t.related}</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 14 }}>
                {related.map((r, i) => {
                  const RIcon = r.icon;
                  return (
                    <div key={i} onClick={() => onOpenTool(r)} className="tool-card"
                      style={{ background: card, borderRadius: 16, padding: 16, cursor: "pointer", borderTop: `4px solid ${r.color}` }}>
                      <RIcon size={18} color={r.color} />
                      <div className="disp" style={{ fontWeight: 700, fontSize: 14, marginTop: 10 }}>{isAr ? r.ar : r.en}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ─────────────── MAIN APP ─────────────── */
    function AllToolsHome() {
      const [lang, setLang] = useState("ar");
      const [dark, setDark] = useState(false);
      const [page, setPage] = useState("home");
      const [activeTool, setActiveTool] = useState(null);
      const [favorites, setFavorites] = useState([]);
      const [visitCounts, setVisitCounts] = useState({});
      const [searchTerm, setSearchTerm] = useState("");
      const isAr = lang === "ar";
      const t = STR[lang];
      const Chevron = isAr ? ChevronLeft : ChevronRight;
      const BackChevron = isAr ? ChevronRight : ChevronLeft;

      useEffect(() => {
        try { const r = localStorage.getItem("all-tools-favorites"); if (r) setFavorites(JSON.parse(r)); } catch(e) {}
        try { const r = localStorage.getItem("all-tools-visit-counts"); if (r) setVisitCounts(JSON.parse(r)); } catch(e) {}
      }, []);

      function toggleFavorite(id) {
        const next = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
        setFavorites(next);
        try { localStorage.setItem("all-tools-favorites", JSON.stringify(next)); } catch(e) {}
      }

      function openTool(tool) {
        setActiveTool(tool); setPage("tool"); window.scrollTo(0, 0);
        const next = { ...visitCounts, [tool.id]: (visitCounts[tool.id] || 0) + 1 };
        setVisitCounts(next);
        try { localStorage.setItem("all-tools-visit-counts", JSON.stringify(next)); } catch(e) {}
      }
      function goHome() { setPage("home"); window.scrollTo(0, 0); }
      function goFavorites() { setPage("favorites"); window.scrollTo(0, 0); }

      const filteredTools = searchTerm.trim()
        ? TOOLS.filter(tool => {
            const q = searchTerm.trim().toLowerCase();
            return tool.ar.toLowerCase().includes(q) || tool.en.toLowerCase().includes(q) ||
                   tool.cat.toLowerCase().includes(q) || tool.catEn.toLowerCase().includes(q);
          })
        : TOOLS;

      const bg = dark ? "#211A3D" : "#FBF7F0";
      const bgAlt = dark ? "#2A2250" : "#F3EEE1";
      const ink = dark ? "#F5F2FF" : "#211A2E";
      const muted = dark ? "#B8AFDA" : "#79726B";
      const card = dark ? "#2E2657" : "#FFFFFF";
      const cardInk = dark ? "#F5F2FF" : "#211A2E";
      const brand = "#6C4CE0";
      const line = dark ? "rgba(255,255,255,0.1)" : "rgba(33,26,46,0.08)";

      return (
        <div dir={isAr ? "rtl" : "ltr"} style={{
          background: bg, color: ink, minHeight: "100vh",
          fontFamily: "'IBM Plex Sans Arabic', sans-serif",
          backgroundImage: dark ? "none" : "radial-gradient(rgba(236,72,153,0.10) 1.6px,transparent 1.6px),radial-gradient(rgba(59,130,246,0.10) 1.6px,transparent 1.6px),radial-gradient(rgba(245,158,11,0.10) 1.6px,transparent 1.6px)",
          backgroundSize: "34px 34px,34px 34px,34px 34px",
          backgroundPosition: "0 0,11px 17px,23px 6px",
          transition: "background-color .3s, color .3s",
        }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');
            * { box-sizing: border-box; }
            .disp { font-family: 'Baloo Bhaijaan 2', sans-serif; }
            .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; }
            .tool-card { transition: transform .18s ease, box-shadow .18s ease; cursor: pointer; }
            .tool-card:hover { transform: translateY(-4px) rotate(-0.4deg); }
            .nav-link { position: relative; }
            .nav-link::after { content:""; position:absolute; bottom:-6px; ${isAr?"right":"left"}:0; width:0; height:3px; border-radius:3px; background:${brand}; transition:width .2s ease; }
            .nav-link:hover::after { width: 100%; }
            .blob { position:absolute; border-radius:50%; filter:blur(38px); opacity:.55; }
            ::selection { background: ${brand}; color: #fff; }
          `}</style>

          {/* HEADER */}
          <header style={{ position: "sticky", top: 0, zIndex: 30, background: dark ? "rgba(33,26,61,0.88)" : "rgba(251,247,240,0.88)", backdropFilter: "blur(10px)", borderBottom: `1px solid ${line}` }}>
            <div style={{ maxWidth: 1180, margin: "0 auto", padding: "16px 24px", display: "flex", alignItems: "center", gap: 24 }}>
              <div className="disp" onClick={goHome} style={{ fontWeight: 800, fontSize: 21, color: brand, whiteSpace: "nowrap", cursor: "pointer" }}>{t.brand}</div>
              <nav style={{ display: "flex", gap: 28, flex: 1 }} className="disp">
                {t.nav.map((item, i) => (
                  <a key={item} href="#" onClick={(e) => { e.preventDefault(); i === 3 ? goFavorites() : goHome(); }}
                    className="nav-link" style={{ color: ink, fontSize: 15, fontWeight: 600, textDecoration: "none" }}>{item}</a>
                ))}
              </nav>
              <button onClick={() => setLang(isAr ? "en" : "ar")} className="mono"
                style={{ display: "flex", alignItems: "center", gap: 6, background: "transparent", border: `1.5px solid ${line}`, color: ink, borderRadius: 10, padding: "7px 10px", fontSize: 12, cursor: "pointer" }}>
                <Globe size={14} /> {isAr ? "EN" : "AR"}
              </button>
              <button onClick={() => setDark(!dark)}
                style={{ display: "flex", alignItems: "center", justifyContent: "center", background: dark ? "#3B2F70" : "#FFF0DC", border: `1.5px solid ${line}`, color: dark ? "#FFD27A" : "#E8873A", borderRadius: 10, width: 34, height: 34, cursor: "pointer" }}>
                {dark ? <Sun size={16} /> : <Moon size={16} />}
              </button>
            </div>
          </header>

          {/* TOOL PAGE */}
          {page === "tool" && activeTool && (
            <ToolPage tool={activeTool} t={t} isAr={isAr} dark={dark} card={card} cardInk={cardInk}
              ink={ink} muted={muted} brand={brand} line={line} Chevron={Chevron} BackChevron={BackChevron}
              visitCount={visitCounts[activeTool.id] || 0} isFav={favorites.includes(activeTool.id)}
              onToggleFav={() => toggleFavorite(activeTool.id)} onBack={goHome} onOpenTool={openTool} />
          )}

          {/* FAVORITES PAGE */}
          {page === "favorites" && (
            <div style={{ maxWidth: 1180, margin: "0 auto", padding: "40px 24px 80px" }}>
              <button onClick={goHome} className="mono"
                style={{ display: "flex", alignItems: "center", gap: 6, background: "transparent", border: `1.5px solid ${line}`, color: muted, borderRadius: 10, padding: "8px 14px", fontSize: 12.5, cursor: "pointer", marginBottom: 28 }}>
                <BackChevron size={14} /> {t.back}
              </button>
              <h1 className="disp" style={{ fontSize: "clamp(24px,3.6vw,34px)", fontWeight: 800, margin: "0 0 24px", color: ink }}>{t.favTitle}</h1>
              {favorites.length === 0 ? (
                <div style={{ color: muted, fontSize: 14 }}>{t.favEmpty}</div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(230px, 1fr))", gap: 16 }}>
                  {TOOLS.filter(tool => favorites.includes(tool.id)).map((tool, i) => {
                    const Icon = tool.icon;
                    return (
                      <div key={i} className="tool-card" onClick={() => openTool(tool)}
                        style={{ background: card, borderRadius: 18, padding: 20, borderTop: `5px solid ${tool.color}`, position: "relative" }}>
                        <button onClick={(e) => { e.stopPropagation(); toggleFavorite(tool.id); }}
                          style={{ position: "absolute", top: 16, [isAr?"left":"right"]: 16, background: "transparent", border: "none", cursor: "pointer", padding: 4 }}>
                          <Heart size={17} color="#EF4444" fill="#EF4444" />
                        </button>
                        <div style={{ width: 40, height: 40, borderRadius: 12, background: `${tool.color}1F`, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
                          <Icon size={19} color={tool.color} />
                        </div>
                        <div className="disp" style={{ fontWeight: 700, fontSize: 16.5 }}>{isAr ? tool.ar : tool.en}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* HOME PAGE */}
          {page === "home" && (
            <>
              {/* HERO */}
              <section style={{ maxWidth: 1180, margin: "0 auto", padding: "72px 24px 56px", position: "relative", overflow: "hidden" }}>
                <div className="blob" style={{ width: 220, height: 220, background: "#EC4899", top: -40, [isAr?"right":"left"]: -20 }} />
                <div className="blob" style={{ width: 180, height: 180, background: "#3B82F6", top: 60, [isAr?"right":"left"]: 160 }} />
                <div className="blob" style={{ width: 160, height: 160, background: "#F59E0B", top: -10, [isAr?"right":"left"]: 320 }} />
                <div style={{ position: "relative" }}>
                  <div className="mono" style={{ color: brand, fontSize: 13, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ width: 26, height: 3, borderRadius: 3, background: brand, display: "inline-block" }} />
                    {t.heroKicker}
                  </div>
                  <h1 className="disp" style={{ fontSize: "clamp(34px,5.4vw,60px)", fontWeight: 800, lineHeight: 1.15, maxWidth: 780, margin: 0 }}>{t.heroTitle}</h1>
                  <p style={{ maxWidth: 560, marginTop: 18, color: muted, fontSize: 16, lineHeight: 1.8 }}>{t.heroSub}</p>
                  <div style={{ marginTop: 34, background: card, borderRadius: 20, padding: 6, maxWidth: 620, display: "flex", alignItems: "center", boxShadow: dark ? "0 20px 40px rgba(0,0,0,0.4)" : "0 20px 40px rgba(108,76,224,0.14)", border: `1.5px solid ${line}` }}>
                    <div style={{ padding: "0 14px", color: brand }}><Search size={18} /></div>
                    <input placeholder={t.searchPh} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                      style={{ flex: 1, border: "none", outline: "none", background: "transparent", color: cardInk, fontSize: 15, padding: "14px 6px", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }} />
                    <button className="mono" onClick={() => document.getElementById("trending-section")?.scrollIntoView({ behavior: "smooth" })}
                      style={{ background: brand, color: "#fff", border: "none", borderRadius: 14, padding: "12px 20px", fontWeight: 600, fontSize: 13, cursor: "pointer", margin: 4 }}>
                      {isAr ? "بحث" : "Go"}
                    </button>
                  </div>
                  <div style={{ display: "flex", gap: 10, marginTop: 20, flexWrap: "wrap" }}>
                    {t.quick.map((q, i) => {
                      const colors = ["#8B5CF6","#3B82F6","#F59E0B","#10B981","#EC4899"];
                      return <span key={q} className="mono" style={{ fontSize: 12.5, padding: "7px 14px", borderRadius: 999, background: dark ? "rgba(255,255,255,0.06)" : `${colors[i]}14`, color: colors[i], fontWeight: 600 }}>{q}</span>;
                    })}
                  </div>
                </div>
              </section>

              <AdSlot label={t.adLabel} line={line} muted={muted} />

              {/* CATEGORIES */}
              <section style={{ maxWidth: 1180, margin: "0 auto", padding: "48px 24px 8px" }}>
                <SectionHead kicker={t.catKicker} title={t.catTitle} brand={brand} muted={muted} ink={ink} />
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 14, marginTop: 26 }}>
                  {CATS.map((c, i) => {
                    const Icon = c.icon;
                    return (
                      <div key={i} style={{ background: card, borderRadius: 18, padding: "22px 16px", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 10, borderTop: `5px solid ${c.color}`, boxShadow: dark ? "0 10px 24px rgba(0,0,0,0.28)" : "0 10px 24px rgba(33,26,46,0.06)" }}>
                        <div style={{ width: 40, height: 40, borderRadius: 12, background: `${c.color}1F`, display: "flex", alignItems: "center", justifyContent: "center" }}><Icon size={20} color={c.color} /></div>
                        <span className="disp" style={{ fontSize: 14.5, fontWeight: 700, color: cardInk }}>{isAr ? c.ar : c.en}</span>
                      </div>
                    );
                  })}
                </div>
              </section>

              {/* TRENDING */}
              <section id="trending-section" style={{ maxWidth: 1180, margin: "0 auto", padding: "56px 24px 8px" }}>
                <SectionHead kicker={t.trendingKicker} title={t.trendingTitle} action={t.seeAll} Chevron={Chevron} brand={brand} muted={muted} ink={ink} />
                {filteredTools.length === 0 ? (
                  <div style={{ marginTop: 26, color: muted, fontSize: 14 }} className="disp">{t.noResults}</div>
                ) : (
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(230px, 1fr))", gap: 16, marginTop: 26 }}>
                    {filteredTools.map((tool, i) => {
                      const Icon = tool.icon;
                      const isFav = favorites.includes(tool.id);
                      return (
                        <div key={i} className="tool-card" onClick={() => openTool(tool)}
                          style={{ background: card, color: cardInk, borderRadius: 18, padding: 20, borderTop: `5px solid ${tool.color}`, boxShadow: dark ? "0 10px 24px rgba(0,0,0,0.28)" : "0 10px 24px rgba(33,26,46,0.06)", position: "relative" }}>
                          <button onClick={(e) => { e.stopPropagation(); toggleFavorite(tool.id); }}
                            style={{ position: "absolute", top: 16, [isAr?"left":"right"]: 16, background: "transparent", border: "none", cursor: "pointer", padding: 4 }}>
                            <Heart size={17} color={isFav ? "#EF4444" : muted} fill={isFav ? "#EF4444" : "none"} />
                          </button>
                          <div style={{ width: 40, height: 40, borderRadius: 12, background: `${tool.color}1F`, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}><Icon size={19} color={tool.color} /></div>
                          <div className="mono" style={{ fontSize: 10.5, color: tool.color, textTransform: "uppercase", marginBottom: 6, fontWeight: 600 }}>{isAr ? tool.cat : tool.catEn}</div>
                          <div className="disp" style={{ fontWeight: 700, fontSize: 16.5, marginBottom: 4 }}>{isAr ? tool.ar : tool.en}</div>
                          <div style={{ fontSize: 13, color: muted, marginBottom: 16, lineHeight: 1.6 }}>{isAr ? tool.ar_d : tool.en_d}</div>
                          <button className="mono" onClick={(e) => { e.stopPropagation(); openTool(tool); }}
                            style={{ fontSize: 12, fontWeight: 600, background: tool.color, color: "#fff", border: "none", borderRadius: 10, padding: "8px 12px", cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                            {t.use} <Chevron size={13} />
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </section>

              {/* RESOURCES */}
              <section style={{ maxWidth: 1180, margin: "0 auto", padding: "56px 24px 8px" }}>
                <SectionHead kicker={t.resKicker} title={t.resTitle} brand={brand} muted={muted} ink={ink} />
                <div style={{ display: "flex", gap: 14, marginTop: 26, overflowX: "auto", paddingBottom: 8 }}>
                  {RESOURCES.map((r, i) => (
                    <div key={i} style={{ minWidth: 190, background: bgAlt, borderRadius: 18, padding: "22px 18px", borderTop: `5px solid ${r.color}` }}>
                      <div className="mono" style={{ fontSize: 11, color: r.color, marginBottom: 10, fontWeight: 600 }}>{`0${i+1}`}</div>
                      <div className="disp" style={{ fontWeight: 700, fontSize: 15.5 }}>{isAr ? r.ar : r.en}</div>
                    </div>
                  ))}
                </div>
              </section>

              <AdSlot label={t.adLabel} line={line} muted={muted} />

              {/* BLOG */}
              <section style={{ maxWidth: 1180, margin: "0 auto", padding: "48px 24px 8px" }}>
                <SectionHead kicker={t.blogKicker} title={t.blogTitle} brand={brand} muted={muted} ink={ink} />
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16, marginTop: 26 }}>
                  {POSTS.map((p, i) => (
                    <div key={i} style={{ background: card, color: cardInk, borderRadius: 18, padding: 20, borderTop: `5px solid ${p.color}`, boxShadow: dark ? "0 10px 24px rgba(0,0,0,0.28)" : "0 10px 24px rgba(33,26,46,0.06)" }}>
                      <div className="mono" style={{ fontSize: 10.5, color: p.color, marginBottom: 12, fontWeight: 600 }}>{p.tag}</div>
                      <div className="disp" style={{ fontWeight: 700, fontSize: 16.5, marginBottom: 14, lineHeight: 1.5 }}>{isAr ? p.ar : p.en}</div>
                      <span style={{ fontSize: 13, fontWeight: 600, color: p.color, display: "flex", alignItems: "center", gap: 6 }}>{t.read} <Chevron size={13} /></span>
                    </div>
                  ))}
                </div>
              </section>

              {/* CTA */}
              <section style={{ maxWidth: 1180, margin: "0 auto", padding: "64px 24px" }}>
                <div style={{ background: `linear-gradient(120deg, ${brand}, #EC4899)`, color: "#fff", borderRadius: 24, padding: "40px 34px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 20 }}>
                  <div>
                    <div className="disp" style={{ fontWeight: 800, fontSize: 24 }}>{t.ctaTitle}</div>
                    <div style={{ color: "rgba(255,255,255,0.85)", marginTop: 6, fontSize: 14.5 }}>{t.ctaSub}</div>
                  </div>
                  <button className="mono" style={{ background: "#fff", color: brand, border: "none", borderRadius: 12, padding: "13px 22px", fontWeight: 700, fontSize: 13.5, cursor: "pointer" }}>{t.ctaBtn}</button>
                </div>
              </section>
            </>
          )}

          {/* FOOTER */}
          <footer style={{ borderTop: `1px solid ${line}`, padding: "26px 24px" }}>
            <div style={{ maxWidth: 1180, margin: "0 auto", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
              <div className="mono" style={{ fontSize: 12, color: muted }}>{t.brand} — {t.tagline}</div>
              <div className="mono" style={{ fontSize: 11.5, color: muted }}>{t.footNote}</div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AllToolsHome />);
  </script>
</body>
</html>
